# default-shell
if-shell "uname | grep -q Darwin" \
    'set-option -g default-shell /opt/homebrew/bin/zsh' \

if-shell '[ "$(uname)" = "Linux" ] && command -v /usr/bin/zsh >/dev/null 2>&1' \
    'set-option -g default-shell /usr/bin/zsh'


if-shell '[ "$(uname)" = "Linux" ] && [ ! -x /usr/bin/zsh ] && command -v /bin/bash >/dev/null 2>&1' \
    'set-option -g default-shell /bin/bash'


if-shell '[ "$(uname)" = "Linux" ] && [ ! -x /usr/bin/zsh ] && [ ! -x /bin/bash ]' \
    'set-option -g default-shell /bin/sh'

set -s escape-time 0

# prefix c-\
unbind c-b
set-option -g prefix c-\\
bind-key c-\\ send-prefix

# color
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ',xterm-256color:Tc'

# keybindings
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n C-h if-shell 'tmux show-environment NVIM_MODE_#{pane_id} 2>/dev/null | grep -q "=i"' \
  "send-keys C-h" \
  "select-pane -L"
bind -n C-j if-shell 'tmux show-environment NVIM_MODE_#{pane_id} 2>/dev/null | grep -q "=i"' \
  "send-keys C-j" \
  "select-pane -D"
bind -n C-k if-shell 'tmux show-environment NVIM_MODE_#{pane_id} 2>/dev/null | grep -q "=i"' \
  "send-keys C-k" \
  "select-pane -U"
bind -n C-l if-shell 'tmux show-environment NVIM_MODE_#{pane_id} 2>/dev/null | grep -q "=i"' \
  "send-keys C-l" \
  "select-pane -R"

bind -n C-n if-shell 'tmux show-environment NVIM_MODE_#{pane_id} 2>/dev/null | grep -q "=i"' \
  "send-keys C-n" \
  "next-window"
bind -n C-p if-shell 'tmux show-environment NVIM_MODE_#{pane_id} 2>/dev/null | grep -q "=i"' \
  "send-keys C-p" \
  "previous-window"

bind -r H resize-pane -L 8
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 8

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection
bind -T copy-mode-vi Escape send -X clear-selection

# new window
bind c new-window -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

bind x kill-pane # kill-pane without confirming

bind y setw synchronize-panes



# mouse
set-option -g mouse on

set-option -g history-limit 15000

# other settings
set-option -g renumber-windows on

# plugins (install: prefix + I, update: prefix + U)
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'ki-chi/tmux-inputmethod'
# continuum
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'

# resurrect
set -g @resurrect-strategy-vim 'session'

# status bar
set-option -g status 2
set-option -g status-position top
set-option -g status-left-length 100
set-option -g status-right-length 120
set-option -g status-interval 1

# bg: clear sky
set -g @bgcolor0 '#005c97'
set -g @bgcolor1 '#1b4a96'
set -g @bgcolor2 '#363795'
set -g @bgcolor_base 'default'
set -g @fg_white '#ffffff'
set -g @fg_gray '#888888'
set -g @fg_black '#000000'
set -g @default_color 'fg=#{E:@fg_gray},bg=#{E:@bgcolor_base},nobold'
set -g @bg_session '#706caa'
set -g @bg_inactive '#333333'
set -g @bg_active '#4e67b0'

run-shell "tmux set -g status-style bg=$(tmux show -gv @bgcolor_base),fg=$(tmux show -gv @fg_gray)"


set -g @cond_prefix '#{?client_prefix,#[fg=#{E:@fg_white}] P,#[fg=#{E:@fg_gray}] P}'
set -g @cond_sync '#{?pane_synchronized,#[fg=#{E:@fg_white}] Y,#[fg=#{E:@fg_gray}] Y}'
set -g @cond_copy '#{?pane_in_mode,#[fg=#{E:@fg_white}] C,#[fg=#{E:@fg_gray}] C}'
set -g @status0-left '#[align=left,fg=#{E:@fg_white},bg=#{E:@bgcolor0},italics] #(tmux -V) #[fg=#{E:@bgcolor0},bg=#{E:@bgcolor1}]#[bg=#{E:@bgcolor1}]#{E:@cond_prefix}#{E:@cond_sync}#{E:@cond_copy} #[fg=#{E:@bgcolor1},bg=#{E:@bgcolor_base}]'
set -g @status0-right '#[align=right,fg=#{E:@bgcolor2},bg=#{E:@bgcolor_base},italics]#[fg=#{E:@fg_white},bg=#{E:@bgcolor2}] #(~/dotfiles/config/tmux/sys.sh) #[fg=#{E:@bgcolor1},bg=#{E:@bgcolor2}]\
#[fg=#{E:@fg_white},bg=#{E:@bgcolor1}] n/a \
#[fg=#{E:@bgcolor0},bg=#{E:@bgcolor1}]\
#[fg=#{E:@fg_white},bg=#{E:@bgcolor0}] %Y/%m/%d %H:%M:%S '

set -g @window_inactive '#[fg=#{E:@bg_inactive}#,bg=#{E:@bgcolor_base}#,italics]#[fg=#{E:@fg_gray}#,bg=#{E:@bg_inactive}] #I  #{window_name} #[fg=#{E:@bg_inactive}#,bg=#{E:@bgcolor_base}]#[default]'
set -g @window_active '#[fg=#{E:@bg_active}#,bg=#{E:@bgcolor_base}]#[fg=#{E:@fg_white}#,bg=#{E:@bg_active}#,bold#,italics] #I  #{window_name} #[fg=#{E:@bg_active}#,bg=#{E:@bgcolor_base}]#[default]'
set -g @status1-right '#[align=right,fg=#{E:@fg_white},bg=#{E:@bgcolor_base},italics]#(~/dotfiles/config/tmux/1_right.sh) '

set -g status-format[0] "#{E:@status0-left} #[#{E:@default_color}] #{E:@status0-center} #{E:@status0-right}"

set -g status-format[1] "#[fg=#{E:@fg_white},bg=#{E:@bg_session},italics] #S #[fg=#{E:@bg_session},bg=#{E:@bgcolor_base}]#[default]\
#{W:#{E:@window_inactive},#{E:@window_active}}\
#{E:@status1-right}"

set -g message-line 0
set -g message-style "fg=white,bg=#0d2a52"
set -g message-command-style "fg=white,bg=#0d2a52"
# set -g message-format '#[fill=#0d2a52]#{message}'

# border color
set -g @pane_active_bg '#00489d'
set -g @pane_active_fg '#{E:@fg_white}'
set -g @pane_inactive_bg '#333333'

set -g @pane_powerline_active '#[fg=#{E:@pane_active_bg},bg=default]'
set -g @pane_powerline_inactive '#[fg=#{E:@pane_inactive_bg},bg=default]'
set -g @pane_powerline_color '#{?pane_active,#{E:@pane_powerline_active},#{E:@pane_powerline_inactive}}'

set -g @pane_contentcolor_active '#[fg=#{E:@pane_active_fg},bg=#{E:@pane_active_bg},italics]'
set -g @pane_contentcolor_inactive '#[fg=#{E:@fg_gray},bg=#{E:@pane_inactive_bg},italics]'
set -g @pane_contentcolor '#{?pane_active,#{E:@pane_contentcolor_active},#{E:@pane_contentcolor_inactive}}'

set -g @pane_content '#{pane_index} #{pane_current_command}  #(cd "#{pane_current_path}" && $HOME/dotfiles/config/tmux/git.sh #{pane_active})'

set-option -g pane-active-border-style "fg=#00a0e9"
set-option -g pane-border-style "fg=#888888"

set -g pane-border-status top
set -g pane-border-format '#{E:@pane_powerline_color}#{E:@pane_contentcolor} #{E:@pane_content} #{E:@pane_powerline_color}#[default]'

set-option -g mode-style "fg=colour0,bg=colour117,italics"


# run plugins (very bottom of .tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
